services:
  # Laravel Backend App
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: ${PROJECT_NAME:-app}-backend
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    networks:
      - app-network
    depends_on:
      - mysql
      - redis

  # Nginx Web Server for Backend API / Admin Blade
  webserver:
    image: nginx:alpine
    container_name: ${PROJECT_NAME:-app}-webserver
    restart: unless-stopped
    ports:
      - "${WEBSERVER_PORT:-8000}:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - backend

  # Vite Dev Server for Inertia React
  frontend:
    image: node:20-alpine
    container_name: ${PROJECT_NAME:-app}-frontend
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    ports:
      - "${VITE_PORT:-5174}:${VITE_PORT:-5174}"
    environment:
      - NODE_ENV=development
    command: sh -c "npm run dev -- --host 0.0.0.0 --port $${VITE_PORT:-5174}"
    networks:
      - app-network
    depends_on:
      - backend

  # MySQL Database
  mysql:
    image: mysql:8.4.2
    container_name: ${PROJECT_NAME:-app}-mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-chanmay_db}
      MYSQL_USER: ${DB_USERNAME:-chanmay_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-chanmay_password}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-chanmay_password}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network

  # Redis for Caching and Queues
  redis:
    image: redis:alpine
    container_name: ${PROJECT_NAME:-app}-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network

  # Mailpit for testing email local
  mailpit:
    image: axllent/mailpit:latest
    container_name: ${PROJECT_NAME:-app}-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - app-network

networks:
  app-network:
    name: ${PROJECT_NAME:-app}-network
    driver: bridge

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
