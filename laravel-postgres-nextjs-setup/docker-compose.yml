services:
  # Next.js Frontend
  frontend:
    image: node:20-alpine
    container_name: ${PROJECT_NAME:-app}-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend-next:/app/.next
      - frontend-node-modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=development
    command: npm run dev
    networks:
      - app-network

  # Laravel Backend App
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: ${PROJECT_NAME:-app}-backend
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    networks:
      - app-network
    depends_on:
      - postgres
      - redis

  # Nginx Web Server for Backend API / Admin Blade
  webserver:
    image: nginx:alpine
    container_name: ${PROJECT_NAME:-app}-webserver
    restart: unless-stopped
    ports:
      - "${WEBSERVER_PORT:-8000}:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - backend

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ${PROJECT_NAME:-app}-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel_db}
      POSTGRES_USER: ${DB_USERNAME:-laravel_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-laravel_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

  # Redis for Caching and Queues
  redis:
    image: redis:alpine
    container_name: ${PROJECT_NAME:-app}-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network

  # Mailpit for testing email local
  mailpit:
    image: axllent/mailpit:latest
    container_name: ${PROJECT_NAME:-app}-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - app-network

networks:
  app-network:
    name: ${PROJECT_NAME:-app}-network
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  frontend-next:
    driver: local
  frontend-node-modules:
    driver: local
